name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # Type Check Backend
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: echo "Backend type check passed!"

  # Import check + unit tests for AI Service
  ai-service-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: python -c "from app.main import app; print('AI service imports OK')"
      - run: python -m pytest tests/ -v

  # Lint and Build Frontend
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Deploy — syncs fork then triggers all 3 Render services
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-check, ai-service-check, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Force-sync fork to upstream HEAD
        continue-on-error: true
        run: |
          UPSTREAM_SHA=$(curl -s \
            -H "Authorization: token ${{ secrets.FORK_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/DSurya11/mockmate/git/ref/heads/main \
            | jq -r '.object.sha')
          echo "Upstream SHA: $UPSTREAM_SHA"
          curl -f -X PATCH \
            -H "Authorization: token ${{ secrets.FORK_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/dantulurisurya71-byte/mockmate/git/refs/heads/main \
            -d "{\"sha\": \"$UPSTREAM_SHA\", \"force\": true}"
          echo "Fork force-synced to $UPSTREAM_SHA"

      - name: Wait for fork sync to propagate
        run: sleep 15

      - name: Deploy Backend
        run: |
          curl -s -X POST "${{ secrets.RENDER_BACKEND_HOOK }}"
          echo "Backend deploy triggered"

      - name: Deploy Frontend
        run: |
          curl -s -X POST "${{ secrets.RENDER_FRONTEND_HOOK }}"
          echo "Frontend deploy triggered"

      - name: Deploy AI Service
        run: |
          curl -s -X POST "${{ secrets.RENDER_AI_HOOK }}"
          echo "AI service deploy triggered"

      - name: Done
        run: echo "All 3 Render services deploying. Check render.com for status."
