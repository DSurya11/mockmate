services:
  # PostgreSQL Database (local - not used for auth, kept for local dev tools)
  postgres:
    image: postgres:16-alpine
    container_name: mockmate-db
    environment:
      POSTGRES_DB: ai_interview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: mockmate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: mockmate-backend
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      COOKIE_SECURE: "false"
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: "10485760"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # Background Workers (BullMQ processors)
  worker:
    build: ./backend
    container_name: mockmate-worker
    command: ["node", "dist/workers/queues.js"]
    ports:
      - "9101:9101"
    volumes:
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AI_SERVICE_URL: http://ai-service:8000
      WORKER_METRICS_PORT: 9101
      GROQ_API_KEY: ${GROQ_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # AI Microservice (Groq-powered)
  ai-service:
    build: ./ai-service
    container_name: mockmate-ai
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
      BACKEND_URL: http://backend:5000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    container_name: mockmate-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_INTERNAL: http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: mockmate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: mockmate-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  uploads_data: